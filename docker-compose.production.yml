services:
  web-platform:
    build:
      context: ./web-platform
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run start
    volumes:
      - ./web-platform/dev.db:/app/dev.db
    environment:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: secret
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_URL_INTERNAL: http://web-platform:3000
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    expose:
      - "3000"
    networks:
      - platform-network

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-platform
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge
