services:
  web-platform:
    build:
      context: ./web-platform
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev
    volumes:
      - ./web-platform:/app
      - /app/node_modules
      - /app/.next
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DATABASE_URL: file:./dev.db
      NEXTAUTH_SECRET: secret
      NEXTAUTH_URL: http://localhost
      NEXTAUTH_URL_INTERNAL: http://web-platform:3000
      AUTH_TRUST_HOST: "true"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      WORKER_POOL_SIZE: "3"
      MONITOR_COUNT: "1"
    ports:
      - "3000:3000"
    expose:
      - "3000"
    networks:
      - platform-network

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-platform
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge
