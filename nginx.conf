events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen       80;
        server_name  localhost;

        # Web Platform Application
        location / {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # HMR WebSocket for Next.js / Turbopack
        location ~* ^/_next/(webpack-hmr|static/webpack/.*\.hot-update\.|turbopack) {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Catch all _next paths including Turbopack/HMR
        location /_next/ {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Dynamic Desktop Routing
        location ~* ^/desktop/(?<sessionId>[a-zA-Z0-9_-]+)(?<remaining>.*)$ {
            auth_request /api/auth/proxy-check;
            rewrite ^/desktop/[a-zA-Z0-9_-]+/(.*)$ /$1 break;
            rewrite ^/desktop/[a-zA-Z0-9_-]+$ / break;

            resolver 127.0.0.11 valid=30s;
            proxy_pass http://$sessionId:6080;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        location = /api/auth/proxy-check {
            internal;
            set $original_uri $request_uri;
            if ($original_uri ~* ^/desktop/([a-zA-Z0-9_-]+)) {
                set $session_id $1;
            }

            proxy_pass http://web-platform:3000/api/auth/proxy-check?sessionId=$session_id;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }
    }
}
