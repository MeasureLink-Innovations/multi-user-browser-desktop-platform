events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Route /desktop/[sessionId] and /desktop/[sessionId]/ to the Next.js viewer page.
        # The viewer page renders iframes with the correct noVNC URLs including the WebSocket path param.
        location ~ ^/desktop/[a-zA-Z0-9_-]+/?$ {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Route /desktop/[sessionId]/<file> to the worker (noVNC assets + websockify WebSocket).
        # Uses .+ (not .*) so the empty sub-path above is handled by the Next.js location.
        location ~ ^/desktop/([a-zA-Z0-9_-]+)/(.+)$ {
            auth_request /_proxy_check;
            auth_request_set $desktop_host $upstream_http_x_desktop_host;

            # Rewrite to remove the /desktop/[sessionId]/ prefix before passing to the worker
            rewrite ^/desktop/([a-zA-Z0-9_-]+)/(.+)$ /$2 break;

            resolver 127.0.0.11 valid=30s;

            proxy_pass http://$desktop_host:6080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Second Monitor Support
        location ~ ^/desktop2/[a-zA-Z0-9_-]+/?$ {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        location ~ ^/desktop2/([a-zA-Z0-9_-]+)/(.+)$ {
            auth_request /_proxy_check;
            auth_request_set $desktop_host $upstream_http_x_desktop_host;

            # Rewrite to remove the /desktop2/[sessionId]/ prefix before passing to the worker
            rewrite ^/desktop2/([a-zA-Z0-9_-]+)/(.+)$ /$2 break;

            resolver 127.0.0.11 valid=30s;

            proxy_pass http://$desktop_host:6081;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_buffering off;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        location = /_proxy_check {
            internal;

            proxy_pass http://web-platform:3000/api/auth/proxy-check;
            proxy_http_version 1.1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}
