events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # Web Platform Application
        location / {
            proxy_pass http://web-platform:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Dynamic Desktop Routing
        # Pattern: /desktop/[sessionId]/...
        location ~* ^/desktop/(?<sessionId>[a-zA-Z0-9_-]+)(?<remaining>.*)$ {
            # Authentication check with the web platform
            auth_request /api/auth/proxy-check;

            # Rewrite path to remove the /desktop/[sessionId] prefix for the worker
            # The worker (noVNC) expects / or its own paths
            rewrite ^/desktop/[a-zA-Z0-9_-]+/(.*)$ /$1 break;
            rewrite ^/desktop/[a-zA-Z0-9_-]+$ / break;

            # Proxy to the worker
            # We use the sessionId as the hostname (mapped to container name)
            resolver 127.0.0.11 valid=30s;
            proxy_pass http://$sessionId:6080;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching for the stream
            proxy_buffering off;
        }

        # Internal auth check endpoint for auth_request
        location = /api/auth/proxy-check {
            internal;
            # Extract sessionId from the original URI
            set $original_uri $request_uri;
            if ($original_uri ~* ^/desktop/([a-zA-Z0-9_-]+)) {
                set $session_id $1;
            }
            
            proxy_pass http://web-platform:3000/api/auth/proxy-check?sessionId=$session_id;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}
